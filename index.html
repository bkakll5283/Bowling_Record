}

function removeTeamPlayer(btn) {
  btn.closest(".team-player-item").remove();
  refreshTeamSelects();
}

document.getElementById("btnAddTeamPlayer").addEventListener("click", () => addTeamPlayer());

// 預設加兩個空格
addTeamPlayer(); addTeamPlayer();

// ══ 遊戲狀態 ══
let tPlayers     = [];   // ["李岱柏","李咨亨", ...]
let tFrames      = {};   // { "李岱柏": [{b1,b2,b3},...], ... }
let tPlayerFrame = {};   // { "李岱柏": 0, ... } 每人各自的當前局數
let tBalls       = [];   // 當前輸入球員目前局的球
let tCurPlayerIdx = 0;   // 目前選中的球員 index
let tCompCode = "";

function tCurPlayer() { return tPlayers[tCurPlayerIdx]; }
function tCurFrame()  { return tPlayerFrame[tCurPlayer()] ?? 0; }

// ── 累計分計算（同記錄頁邏輯）──
function tCalcCumulative(playerName) {
  const allF = [...(tFrames[playerName] || [])];
  // 若是當前輸入球員，把目前輸入中的球也算進去
  if (playerName === tCurPlayer()) {
    allF[tCurFrame()] = { b1: tBalls[0], b2: tBalls[1], b3: tBalls[2] };
  }
  let flatRolls = [], flatRaws = [];
  for (let f = 0; f < allF.length; f++) {
    const fr = allF[f];
    if (!fr || fr.b1 === undefined) break;
    const v1 = rawToValue(fr.b1, 0);
    if (f < 9) {
      flatRaws.push(fr.b1); flatRolls.push(v1);
      if (fr.b1 !== "X") {
        if (fr.b2 === undefined) break;
        flatRaws.push(fr.b2); flatRolls.push(rawToValue(fr.b2, v1));
      }
    } else {
      flatRaws.push(fr.b1); flatRolls.push(v1);
      if (fr.b2 !== undefined) {
        const v2 = fr.b1 === "X" ? rawToValue(fr.b2, 0) : rawToValue(fr.b2, v1);
        flatRaws.push(fr.b2); flatRolls.push(v2);
        if (fr.b3 !== undefined) {
          let p3 = 0;
          if (fr.b1 === "X" && fr.b2 === "X") p3 = 0;
          else if (fr.b1 === "X") p3 = v2;
          flatRaws.push(fr.b3); flatRolls.push(rawToValue(fr.b3, p3));
        }
      }
    }
  }
  const cum = [];
  let ri = 0;
  for (let f = 0; f < 10 && ri < flatRolls.length; f++) {
    if (f < 9) {
      if (flatRaws[ri] === "X") {
        if (ri+2 >= flatRolls.length) { cum.push(null); ri++; break; }
        cum.push((cum[f-1]||0)+10+flatRolls[ri+1]+flatRolls[ri+2]); ri++;
      } else if (flatRaws[ri+1] === "/") {
        if (ri+2 >= flatRolls.length) { cum.push(null); ri+=2; break; }
        cum.push((cum[f-1]||0)+10+flatRolls[ri+2]); ri+=2;
      } else {
        if (ri+1 >= flatRolls.length) { cum.push(null); ri+=2; break; }
        cum.push((cum[f-1]||0)+flatRolls[ri]+flatRolls[ri+1]); ri+=2;
      }
    } else {
      const avail = flatRolls.length - ri;
      const needs3 = flatRaws[ri]==="X" || flatRaws[ri+1]==="/";
      if (avail < 2) { cum.push(null); break; }
      if (needs3 && avail < 3) { cum.push(null); break; }
      cum.push((cum[f-1]||0)+flatRolls[ri]+(flatRolls[ri+1]||0)+(needs3?(flatRolls[ri+2]||0):0));
    }
  }
  return cum;
}

// ── 渲染投球格 ──
function tRenderBalls() {
  const container = document.getElementById("teamBalls");
  container.innerHTML = "";
  const total = tCurFrame() === 9 ? 3 : 2;
  for (let b = 0; b < total; b++) {
    const val = tBalls[b];
    let cls = "cur-ball";
    if (val === undefined)  cls += " waiting";
    else if (val === "X")   cls += " strike-box";
    else if (val === "/")   cls += " spare-box";
    else                    cls += " filled";
    const div = document.createElement("div");
    div.className = cls;
    div.textContent = val !== undefined ? val : "";
    const lbl = document.createElement("span");
    lbl.className = "ball-label";
    lbl.textContent = `第${["一","二","三"][b]}球`;
    div.appendChild(lbl);
    container.appendChild(div);
  }
}

// ── 更新即時分數顯示 ──
function tUpdateScoreDisplay() {
  const cum = tCalcCumulative(tCurPlayer());
  const last = [...cum].reverse().find(v => v !== null);
  document.getElementById("teamScoreValue").textContent = last !== undefined ? last : "—";
}

// ── 更新所有人分數總覽（可點擊切換）──
function tUpdateScoreboard() {
  const sb = document.getElementById("gameScoreboard");

  sb.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:4px">
      ${tPlayers.map((p, pi) => {
        const cum = tCalcCumulative(p);
        const last = [...cum].reverse().find(v => v !== null);
        const pFrame = tPlayerFrame[p] ?? 0;
        const isDone = pFrame >= 10;
        const isCur = pi === tCurPlayerIdx;
        const nameColor = isCur ? "var(--accent)" : "var(--text)";
        const scoreColor = isDone ? "var(--spare)" : isCur ? "var(--accent)" : "var(--muted)";
        const border = isCur
          ? "border:1px solid var(--accent);box-shadow:0 0 5px rgba(59,158,222,.4)"
          : isDone
            ? "border:1px solid var(--spare)"
            : "border:1px solid var(--border)";
        const frameLabel = isDone ? "完成" : FRAME_NAMES[pFrame].slice(1);
        return `<div onclick="tSwitchPlayer(${pi})"
          style="${border};border-radius:6px;padding:5px 7px;background:var(--bg);cursor:pointer;transition:border-color .15s">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:.68rem;color:${nameColor};font-weight:${isCur?'bold':'normal'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px">${p}</div>
            <div style="font-size:.55rem;color:${isDone?'var(--spare)':'var(--muted)'};flex-shrink:0">${frameLabel}</div>
          </div>
          <div style="font-size:1.1rem;font-weight:bold;color:${scoreColor};text-align:right;margin-top:1px">${last !== undefined ? last : "—"}</div>
        </div>`;
      }).join("")}
    </div>`;
}

// ── 點擊卡片切換輸入球員 ──
function tSwitchPlayer(pi) {
  if (pi === tCurPlayerIdx) return; // 已是當前球員
  const p = tPlayers[pi];
  if ((tPlayerFrame[p] ?? 0) >= 10) return; // 已完成不能切換

  // 儲存目前輸入中但未完成的球（清除）
  tBalls = [];
  tCurPlayerIdx = pi;

  tUpdateHeader();
  tRenderBalls();
  tUpdateScoreDisplay();
  tUpdateScoreboard();
  tBuildKeypad();

  document.getElementById("gamePlayerName").classList.add("fade-up");
  setTimeout(() => document.getElementById("gamePlayerName").classList.remove("fade-up"), 300);
}

// ── 更新頂部標題 ──
function tUpdateHeader() {
  document.getElementById("gamePlayerName").textContent = tCurPlayer();
  document.getElementById("gamePlayerOrder").textContent =
    `第 ${tCurPlayerIdx+1} 位・${FRAME_NAMES[tCurFrame()]}`;
  document.getElementById("gameFrameLabel").textContent = FRAME_NAMES[tCurFrame()];
  // 顯示整體完成進度
  const totalDone = tPlayers.reduce((acc, p) => acc + (tPlayerFrame[p] ?? 0), 0);
  const totalPossible = tPlayers.length * 10;
  document.getElementById("gameProgressText").textContent = `${totalDone}/${totalPossible} 局`;
}

// ── 判斷當前球員當前局是否完成 ──
function tIsFrameDone() {
  const f = tCurFrame();
  if (f < 9) return tBalls[0] === "X" || tBalls.length >= 2;
  if (tBalls.length < 2) return false;
  const needs3 = tBalls[0] === "X" || tBalls[1] === "/";
  return needs3 ? tBalls.length >= 3 : tBalls.length >= 2;
}

// ── 建立鍵盤 ──
function tBuildKeypad() {
  const pad = document.getElementById("teamKeypad");
  pad.innerHTML = "";
  const f = tCurFrame();
  const ballIdx = tBalls.length;
  let maxPins = 10;
  if (f < 9) {
    if (ballIdx === 1 && tBalls[0] !== "X") maxPins = 10 - rawToValue(tBalls[0], 0);
  } else {
    if (ballIdx === 1 && tBalls[0] !== "X") maxPins = 10 - rawToValue(tBalls[0], 0);
    else if (ballIdx === 2 && tBalls[0] === "X" && tBalls[1] !== "X")
      maxPins = 10 - rawToValue(tBalls[1], 0);
  }
  const canSpare = ballIdx === 1 && tBalls[0] !== "X";
  const canSpare10 = f === 9 && ballIdx === 2 && tBalls[0] === "X" && tBalls[1] !== "X" && tBalls[1] !== "/";

  const keys = [
    {label:"1",val:"1"},{label:"2",val:"2"},{label:"3",val:"3"},{label:"X",val:"X",cls:"key-strike"},
    {label:"4",val:"4"},{label:"5",val:"5"},{label:"6",val:"6"},{label:"/",val:"/",cls:"key-spare"},
    {label:"7",val:"7"},{label:"8",val:"8"},{label:"9",val:"9"},{label:"0",val:"0"},
    {label:"-",val:"-",cls:"key-gutter"},{label:"",val:"",cls:"key-gutter",disabled:true},
    {label:"",val:"",cls:"key-gutter",disabled:true},{label:"⌫",val:"DEL",cls:"key-del"},
  ];

  keys.forEach(k => {
    const btn = document.createElement("button");
    btn.className = "key " + (k.cls || "key-num");
    btn.textContent = k.label;
    let dis = k.disabled || false;
    if (!dis && k.val !== "DEL" && k.val !== "") {
      if (k.val === "X") {
        const ok0 = ballIdx === 0;
        const ok10 = f === 9 && (ballIdx === 0 ||
          (ballIdx === 1 && tBalls[0] === "X") ||
          (ballIdx === 2 && (tBalls[1] === "X" || tBalls[1] === "/")));
        dis = f < 9 ? !ok0 : !ok10;
      } else if (k.val === "/") {
        dis = !(canSpare || canSpare10);
      } else if (k.val !== "-") {
        const num = parseInt(k.val, 10);
        dis = maxPins < 10 ? num >= maxPins : num > maxPins;
      }
    }
    if (dis) btn.disabled = true;
    btn.addEventListener("click", () => tHandleInput(k.val));
    pad.appendChild(btn);
  });
}

// ── 處理輸入 ──
function tHandleInput(val) {
  if (val === "DEL") {
    if (tBalls.length > 0) { tBalls.pop(); tRenderBalls(); tUpdateScoreDisplay(); tBuildKeypad(); }
    return;
  }
  if (val === "") return;
  tBalls.push(val);
  tRenderBalls(); tUpdateScoreDisplay(); tBuildKeypad();
  if (tIsFrameDone()) setTimeout(tAdvance, 420);
}

// ── 完成一球員一局，更新進度，等待手動切換 ──
function tAdvance() {
  const p = tCurPlayer();
  const f = tCurFrame();

  // 儲存該球員該局
  if (!tFrames[p]) tFrames[p] = [];
  tFrames[p][f] = { b1: tBalls[0], b2: tBalls[1], b3: tBalls[2] };

  // 推進該球員的局數
  tPlayerFrame[p] = f + 1;
  tBalls = [];

  // 檢查所有人是否都完成 10 局
  const allDone = tPlayers.every(pl => (tPlayerFrame[pl] ?? 0) >= 10);
  if (allDone) { tShowGameOver(); return; }

  // 自動跳到下一位尚未完成的球員（同局優先）
  const targetFrame = Math.min(...tPlayers.map(pl => tPlayerFrame[pl] ?? 0));
  const nextIdx = tPlayers.findIndex((pl, i) =>
    i !== tCurPlayerIdx && (tPlayerFrame[pl] ?? 0) < 10 && (tPlayerFrame[pl] ?? 0) <= targetFrame
  );
  if (nextIdx >= 0) tCurPlayerIdx = nextIdx;

  tUpdateHeader();
  tRenderBalls();
  tUpdateScoreDisplay();
  tUpdateScoreboard();
  tBuildKeypad();

  document.getElementById("gamePlayerName").classList.add("fade-up");
  setTimeout(() => document.getElementById("gamePlayerName").classList.remove("fade-up"), 400);
}

// ── 結束畫面 ──
function tShowGameOver() {
  document.getElementById("teamGamePanel").style.display = "none";
  const panel = document.getElementById("teamGameOverPanel");
  panel.classList.add("show");

  const results = tPlayers.map(p => {
    const cum = tCalcCumulative(p);
    const total = cum[9] ?? 0;
    return { player: p, total };
  }).sort((a, b) => b.total - a.total);

  const rankEmoji = ["🥇","🥈","🥉"];
  document.getElementById("gameResultList").innerHTML = results.map((r, i) => `
    <div class="game-result-item">
      <div class="game-result-rank">${rankEmoji[i] || (i+1)}</div>
      <div class="game-result-name">${r.player}</div>
      <div class="game-result-score">${r.total}</div>
    </div>`).join("");
}

// ── 開始遊戲 ──
document.getElementById("btnStartTeamGame").addEventListener("click", () => {
  tPlayers = getTeamSelectedPlayers();
  if (tPlayers.length < 2) {
    alert("請至少選擇 2 位球員");
    return;
  }
  tCompCode = document.getElementById("teamCompCode").value.trim();
  tFrames = {}; tPlayerFrame = {}; tBalls = []; tCurPlayerIdx = 0;
  tPlayers.forEach(p => { tFrames[p] = []; tPlayerFrame[p] = 0; });

  document.getElementById("teamSetupPanel").style.display = "none";
  document.getElementById("teamGamePanel").style.display = "flex";
  document.getElementById("teamGameOverPanel").classList.remove("show");

  tUpdateHeader(); tRenderBalls(); tUpdateScoreDisplay(); tUpdateScoreboard(); tBuildKeypad();
});

// ── 放棄本場 ──
document.getElementById("btnAbortTeamGame").addEventListener("click", () => {
  if (!confirm("確定要放棄本場記錄？")) return;
  document.getElementById("teamGamePanel").style.display = "none";
  document.getElementById("teamSetupPanel").style.display = "flex";
});

// ── 重新設定 ──
document.getElementById("btnTeamRestart").addEventListener("click", () => {
  document.getElementById("teamGameOverPanel").classList.remove("show");
  document.getElementById("teamSetupPanel").style.display = "flex";
  document.getElementById("teamUploadMsg").textContent = "";
});

// ── 上傳全部得分 ──
document.getElementById("btnUploadTeam").addEventListener("click", async () => {
  const msgEl = document.getElementById("teamUploadMsg");
  msgEl.textContent = "上傳中…";
  msgEl.style.color = "var(--muted)";

  const today = new Date();
  const date = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
  const isComp = tCompCode.length > 0;

  try {
    const payload = {
      action: "batchUpload",
      date,
      isCompetition: isComp,
      compCode: tCompCode,
      players: tPlayers.map(p => {
        const cum = tCalcCumulative(p);
        return {
          player: p,
          frames: Array.from({length: 10}, (_, i) => {
            const fr = tFrames[p]?.[i];
            return { b1: fr?.b1 || "", b2: fr?.b2 || "", b3: fr?.b3 || "",
                     score: cum[i] != null ? String(cum[i]) : "" };
          })
        };
      })
    };

    await fetch(APPS_SCRIPT_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    msgEl.textContent = `✅ 已上傳 ${tPlayers.length} 位球員的成績！`;
    msgEl.style.color = "var(--spare)";
    document.getElementById("btnUploadTeam").disabled = true;
  } catch(e) {
    msgEl.textContent = "❌ 上傳失敗：" + e.message;
    msgEl.style.color = "#e74c3c";
  }
});

// ── 啟動 ──
buildMiniTable(); updateActiveFrame(); updateTitle(); renderCurrentBalls(); buildKeypad();
